# https://sw.kovidgoyal.net/kitty/overview/#configuring-kitty

# ===== 字体配置 =====
#font_family FantasqueSansM Nerd Font
#font_family Victor Mono
# font_family Monofur Nerd Font
font_family iosevkaTermSlab Nerd Font
# bold_font auto
# italic_font auto
# bold_italic_font auto

font_size 16
adjust_line_height 115%
#adjust_column_width 100%
#disable_ligatures never

# 下划线定制（基于你的描述）
modify_font underline_position 3
# 加粗下划线
modify_font underline_thickness 200%

# ===== 颜色主题 - 推荐几款热门主题 =====
# 取消注释其中一款你喜欢的主题：
include themes/oasis_rose.conf

# ===== 背景效果 =====
background_opacity 0.85
background_blur 20
dynamic_background_opacity yes

# ===== 光标样式 =====
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 3

# ===== 鼠标样式 =====
mouse_hide_wait 3.0
url_style curly

# ===== 标签栏样式 =====
tab_bar_edge top

# ===== 窗口布局 =====
#remember_window_size yes
#initial_window_width  1200
#initial_window_height 800
#enabled_layouts tall,stack,fat,grid
#window_border_width 1.5pt
#window_margin_width 5
#single_window_margin_width -1
#window_padding_width 10
#active_border_color #7aa2f7
#inactive_border_color #414868

# ===== 快捷键优化 =====
# 复制粘贴
map cmd+c        copy_to_clipboard
map cmd+v        paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# 标签页管理
map cmd+t        new_tab
map cmd+w        close_tab
map cmd+1        goto_tab 1
map cmd+2        goto_tab 2
map cmd+3        goto_tab 3
map cmd+4        goto_tab 4
map cmd+5        goto_tab 5
map cmd+6        goto_tab 6
map cmd+7        goto_tab 7
map cmd+8        goto_tab 8
map cmd+9        goto_tab 9
map cmd+0        goto_tab 10
map cmd+right    next_tab
map cmd+left     previous_tab

# 窗口分屏
map cmd+enter    new_window
map cmd+d        launch --location=hsplit --cwd=current
map cmd+shift+d  launch --location=vsplit --cwd=current
map cmd+r        start_resizing_window

# 字体大小调整
map cmd+equal    change_font_size all +2.0
map cmd+minus    change_font_size all -2.0
map cmd+0        change_font_size all 0

# ===== 高级功能 =====
# MacOS 特殊键设置
macos_option_as_alt yes
macos_show_window_title_in none
macos_thicken_font 0.5
macos_traditional_fullscreen yes

# 性能优化
repaint_delay 10
input_delay 3
sync_to_monitor yes

# 终端行为
shell_integration enabled
allow_hyperlinks yes
term xterm-256color

# 选中即复制（可选）
copy_on_select yes

# 铃声设置
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab "🔔 "
